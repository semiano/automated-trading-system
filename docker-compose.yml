services:
  postgres:
    image: postgres:15
    command:
      [
        "postgres",
        "-c",
        "shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}",
        "-c",
        "work_mem=${POSTGRES_WORK_MEM:-4MB}",
        "-c",
        "max_connections=${POSTGRES_MAX_CONNECTIONS:-20}",
      ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: ${POSTGRES_MEM_LIMIT:-384m}
    mem_reservation: ${POSTGRES_MEM_RESERVATION:-256m}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MDTAS_CONFIG_PATH: /app/config.yaml
      MDTAS_LOG_LEVEL: ${MDTAS_LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${MDTAS_CONFIG_FILE:-./config.yaml}:/app/config.yaml:ro
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: ${API_MEM_LIMIT:-384m}
    mem_reservation: ${API_MEM_RESERVATION:-256m}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MDTAS_CONFIG_PATH: /app/config.yaml
      MDTAS_LOG_LEVEL: ${MDTAS_LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${MDTAS_CONFIG_FILE:-./config.yaml}:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    mem_limit: ${INGESTION_MEM_LIMIT:-256m}
    mem_reservation: ${INGESTION_MEM_RESERVATION:-128m}

  trader:
    build:
      context: .
      dockerfile: docker/trader.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MDTAS_CONFIG_PATH: /app/config.yaml
      MDTAS_LOG_LEVEL: ${MDTAS_LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${MDTAS_CONFIG_FILE:-./config.yaml}:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    mem_limit: ${TRADER_MEM_LIMIT:-256m}
    mem_reservation: ${TRADER_MEM_RESERVATION:-128m}

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      NODE_OPTIONS: ${WEB_NODE_OPTIONS:---max-old-space-size=192}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    mem_limit: ${WEB_MEM_LIMIT:-256m}
    mem_reservation: ${WEB_MEM_RESERVATION:-128m}

volumes:
  pgdata:
