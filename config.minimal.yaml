providers:
  default_provider: "mock"

symbols:
  - "BTC/USDT"

timeframes:
  - "5m"

cache_horizon_days:
  "5m": 30

ingestion:
  warmup_bars: 500
  warmup_bars_per_cycle_cap: 500
  poll_delay_seconds: 10
  retries: 3
  backoff_seconds: 2
  allow_gap_jump_to_recent: true
  max_catchup_bars_per_cycle: 300

trading:
  enabled: true
  runtime_timeframe: "5m"
  sizing_mode: "fixed_notional"
  risk_per_trade_usd: 5.0
  max_position_notional_usd: null
  use_regime_filter: true
  htf_timeframe: "1h"
  regime_trend_ema_fast: 50
  regime_trend_ema_slow: 200
  chop_filter_mode: "bb_width"
  chop_bb_length: 20
  chop_bb_stdev: 2.0
  chop_bb_width_min: 0.01
  chop_atr_pct_min: 0.003
  cooldown_bars_after_exit: 10
  cooldown_bars_after_stop: 30
  max_entries_per_hour: 6
  max_entries_per_day: 40
  timezone: "UTC"
  execution_adapter: "paper"
  live_trading_enabled: false
  live_allow_short: false
  live_max_order_notional_usd: 25.0
  live_allowed_symbols: []
  live_require_explicit_env_ack: true
  live_ack_env_var_name: "MDTAS_ENABLE_LIVE_TRADING"
  live_ack_env_var_value: "YES_I_ACKNOWLEDGE_LIVE_TRADING_RISK"
  position_size_usd: 50.0
  soft_portfolio_risk_limit_usd: 50.0
  risk_budget_policy: "per_symbol"
  portfolio_soft_risk_limit_usd: 0.0
  fee_bps: 6.0
  slippage_bps: 2.0
