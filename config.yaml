providers:
  default_provider: "ccxt"
  ccxt:
    venue: "coinbase"
    rate_limit: true

symbols:
  - "HBAR/USDT"
  - "XRP/USDT"

timeframes:
  - "1m"
  - "5m"
  - "1h"

cache_horizon_days:
  "1m": 30
  "5m": 180
  "1h": 730
  "1d": 3650

ingestion:
  warmup_bars: 800
  poll_delay_seconds: 20
  retries: 5
  backoff_seconds: 2
  allow_gap_jump_to_recent: true
  max_catchup_bars_per_cycle: 800

indicators:
  bollinger:
    length: 20
    stdev: 2.0
  rsi:
    length: 14
  atr:
    length: 14
  ema_lengths:
    - 20
    - 50
    - 200
  volume_sma: 20
  vwap_mode: "rolling"

trading:
  enabled: true
  runtime_timeframe: "1m"
  sizing_mode: "fixed_notional"
  risk_per_trade_usd: 5.0
  max_position_notional_usd: null
  use_regime_filter: true
  htf_timeframe: "1h"
  regime_trend_ema_fast: 50
  regime_trend_ema_slow: 200
  chop_filter_mode: "bb_width"
  chop_bb_length: 20
  chop_bb_stdev: 2.0
  chop_bb_width_min: 0.01
  chop_atr_pct_min: 0.003
  cooldown_bars_after_exit: 10
  cooldown_bars_after_stop: 30
  max_entries_per_hour: 6
  max_entries_per_day: 40
  timezone: "UTC"
  execution_adapter: "paper"
  live_trading_enabled: false
  live_allow_short: false
  live_max_order_notional_usd: 25.0
  live_allowed_symbols: []
  live_require_explicit_env_ack: true
  live_ack_env_var_name: "MDTAS_ENABLE_LIVE_TRADING"
  live_ack_env_var_value: "YES_I_ACKNOWLEDGE_LIVE_TRADING_RISK"
  position_size_usd: 100.0
  soft_portfolio_risk_limit_usd: 0.0
  risk_budget_policy: "per_symbol"
  portfolio_soft_risk_limit_usd: 0.0
  fee_bps: 6.0
  slippage_bps: 2.0
  tuned_params_path: "artifacts/xrp_tuned_engine_params_selected.yaml"
  default_constraints:
    min_notional_usd: 10.0
    qty_step: 0.0001
    price_tick: null
    fee_bps: 6.0
  per_asset_constraints:
    XRP/USDT:
      min_notional_usd: 10.0
      qty_step: 0.1
      price_tick: 0.0001
      fee_bps: 6.0
  default_params:
    rsi_length: 14
    atr_length: 14
    ema_fast: 12
    ema_slow: 34
    rsi_entry: 42.0
    rsi_exit: 58.0
    stop_atr: 1.3
    take_profit_atr: 2.2
    max_hold_bars: 180
  per_asset_params:
    XRP/USDT:
      rsi_length: 19
      atr_length: 10
      ema_fast: 7
      ema_slow: 50
      rsi_entry: 34
      rsi_exit: 64
      stop_atr: 2.3
      take_profit_atr: 1.4
      max_hold_bars: 60
